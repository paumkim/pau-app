name: pau_translator
description: Pau — Zomi language translation app for work, school, and daily life.
publish_to: 'none'
version: 1.1.0+3

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  http: ^1.1.0
  speech_to_text: ^6.3.0
  flutter_tts: ^3.7.0
  provider: ^6.1.1
  flutter_local_notifications: ^16.3.2
  file_picker: ^8.3.2
  archive: ^4.0.9
  hive: ^2.2.3
  hive_flutter: ^1.1.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/pau_icon.png"
  adaptive_icon_background: "#1877F2"
  adaptive_icon_foreground: "assets/icons/pau_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/books/
    - assets/plugins/
    - assets/bible/
    - assets/bibles/tedim/
    - assets/bibles/kjv/
    - assets/bibles/my_judson/
    - assets/bibles/ms_alkitab/
    - assets/lyrics/
